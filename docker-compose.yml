services:

  web:
    build: .
    restart: unless-stopped
    networks:
      - network_public
    ports:
      - "8000:8000"  
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-portas.adrofecha.com.br,192.168.0.110,localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://portas.adrofecha.com.br, http://192.168.0.110:8000}
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${DATABASE_NAME:-portas_db}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
    volumes:
      - media_data:/app/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sistema-portas.rule=Host(`${DOMAIN:-portas.adrofecha.com.br}`)"
      - "traefik.http.routers.sistema-portas.entrypoints=websecure"
      - "traefik.http.routers.sistema-portas.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.sistema-portas.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  media_data:

networks:
  network_public:
    external: true
