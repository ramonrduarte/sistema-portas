{% load static %}

<form method="post" id="vidro-form" action="{{ request.path }}">
  {% csrf_token %}

  {{ form.non_field_errors }}

  <div class="row mb-3">
    <div class="col-md-4">
      <label class="form-label">{{ form.codigo.label }}</label>
      {{ form.codigo }}
      <div class="text-danger small">{{ form.codigo.errors }}</div>
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-8">
      <label class="form-label">{{ form.descricao.label }}</label>
      {{ form.descricao }}
      <div class="text-danger small">{{ form.descricao.errors }}</div>
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-4">
      <label class="form-label">{{ form.espessura.label }}</label>
      <div class="d-flex gap-2">
        {{ form.espessura }}
        <button type="button"
                class="btn btn-outline-secondary btn-sm"
                data-bs-toggle="modal"
                data-bs-target="#espessuraModal"
                data-url="{% url 'cadastrar_espessura' %}">
          + Nova espessura
        </button>
      </div>
      <div class="text-danger small">{{ form.espessura.errors }}</div>
    </div>

    <div class="col-md-4">
      <label class="form-label">{{ form.preco.label }}</label>
      <div class="input-group">
        <span class="input-group-text">R$</span>
        {{ form.preco }}
      </div>
      <div class="text-danger small">{{ form.preco.errors }}</div>
    </div>
  </div>
</form>
