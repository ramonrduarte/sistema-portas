{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="m-0">Divisores</h3>
  <button class="btn btn-primary"
          hx-get="{% url 'cadastrar_divisor' %}"
          hx-target="#modalConteudo"
          data-bs-toggle="modal"
          data-bs-target="#modalCadastro">
    + Cadastrar Divisor
  </button>
</div>

<form method="get" class="mb-3">
  <div class="row g-2 align-items-end flex-wrap">
    <div class="col-12 col-sm-auto flex-grow-1" style="min-width:220px;">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" name="q" class="form-control"
               placeholder="Código, descrição ou modelo..."
               value="{{ q }}"
               hx-get="{% url 'lista_divisores' %}"
               hx-trigger="keyup changed delay:400ms"
               hx-target="#conteudoTabela"
               hx-swap="innerHTML"
               hx-include="[name='sort'],[name='dir']"
               autocomplete="off">
      </div>
    </div>
    <div class="col-auto d-flex gap-2">
      <button type="submit" class="btn btn-secondary">Filtrar</button>
      <a href="{% url 'lista_divisores' %}" class="btn btn-outline-secondary">Limpar</a>
    </div>
  </div>
  <input type="hidden" name="sort" value="{{ sort }}">
  <input type="hidden" name="dir" value="{{ dir }}">
</form>

<div id="conteudoTabela">
  {% include "portas/divisor/divisor_tabela.html" %}
</div>
{% endblock %}
