<form method="post"
      hx-post="{% if puxador %}{% url 'editar_puxador' puxador.pk %}{% else %}{% url 'cadastrar_puxador' %}{% endif %}"
      hx-target="#conteudoTabela"
      hx-swap="innerHTML">
  {% csrf_token %}

  <div class="row g-3">
    <div class="col-md-3">
      <label class="form-label">Código</label>
      {{ form.codigo }}
      <div class="text-danger small">{{ form.codigo.errors }}</div>
    </div>

    <div class="col-md-9">
      <label class="form-label">Descrição</label>
      {{ form.descricao }}
      <div class="text-danger small">{{ form.descricao.errors }}</div>
    </div>

    <div class="col-md-4">
      <label class="form-label">Preço</label>
      {{ form.preco }}
      <div class="text-danger small">{{ form.preco.errors }}</div>
    </div>

    <div class="col-md-8">
      <div class="d-flex justify-content-between align-items-center">
        <label class="form-label mb-0">Acabamento</label>

        <button type="button"
                class="btn btn-sm btn-outline-secondary"
                hx-get="{% url 'cadastrar_acabamento' %}?origem=puxador"
                hx-target="#modalConteudo">
        + Novo acabamento
        </button>
      </div>

      <div id="wrapAcabamentoSelect" class="mt-1">
        {{ form.acabamento }}
      </div>

      <div class="text-danger small">{{ form.acabamento.errors }}</div>
    </div>

    <div class="col-md-6">
      <label class="form-label">Tipo</label>
      {{ form.tipo }}
      <div class="text-danger small">{{ form.tipo.errors }}</div>
    </div>

    <div class="col-md-6">
      <label class="form-label">Modelo</label>
      {{ form.modelo }}
      <div class="text-danger small">{{ form.modelo.errors }}</div>
    </div>
  </div>

  <div class="d-flex gap-2 mt-4">
    <button class="btn btn-primary" type="submit">Salvar</button>
    <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
  </div>
</form>
