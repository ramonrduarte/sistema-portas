{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="m-0">Acabamentos</h3>

  <button class="btn btn-primary"
          hx-get="{% url 'cadastrar_acabamento' %}"
          hx-target="#modalConteudo"
          data-bs-toggle="modal"
          data-bs-target="#modalCadastro">
    + Cadastrar Acabamento
  </button>
</div>

<div id="conteudoTabela">
  {% include "portas/_acabamentos_tabela.html" %}
</div>

<!-- Modal -->
<div class="modal fade" id="modalCadastro" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Cadastro</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalConteudo"></div>
    </div>
  </div>
</div>

<script>
  document.body.addEventListener("htmx:afterSwap", function(e){
    if (e.target && e.target.id === "conteudoTabela") {
      const modalEl = document.getElementById("modalCadastro");
      const modal = bootstrap.Modal.getInstance(modalEl);
      if (modal) modal.hide();
    }
  });
</script>

{% endblock %}
