<span id="modalTitulo" hx-swap-oob="true">
  {% if acabamento %}Editar Acabamento{% else %}Cadastrar Acabamento{% endif %}
</span>

<form method="post"
      hx-post="{% if acabamento %}{% url 'editar_acabamento' acabamento.pk %}{% else %}{% url 'cadastrar_acabamento' %}{% endif %}"
      hx-target="#conteudoTabela"
      hx-swap="innerHTML">
  {% csrf_token %}

  <div class="row g-3">
    <div class="col-md-12">
      <label class="form-label">Nome</label>
      {{ form.nome }}
      <div class="text-danger small">{{ form.nome.errors }}</div>
    </div>
  </div>

  <div class="d-flex gap-2 mt-4">
    <button class="btn btn-primary" type="submit">Salvar</button>
    <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
  </div>
</form>
