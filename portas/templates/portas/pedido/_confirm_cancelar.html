<span id="modalTitulo" hx-swap-oob="true">Cancelar pedido</span>

<div hx-swap-oob="true" id="modalDialogClass">
  modal-dialog modal-dialog-centered
</div>

<div class="mb-4">
  <p class="mb-1">Deseja cancelar o pedido <strong>#{{ pedido.numero }}</strong>?</p>
  <p class="text-muted small mb-0">
    {{ pedido.data|date:"d/m/Y" }} &bull; {{ pedido.cliente.codigo }} – {{ pedido.cliente.nome }}
  </p>
  <div class="alert alert-warning mt-3 mb-0 small py-2">
    O pedido será marcado como <strong>Cancelado</strong> e removido da produção.
  </div>
</div>

<div class="d-flex justify-content-end gap-2">
  <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
  <button class="btn btn-warning"
          hx-post="{% url 'pedido_cancelar' pedido.id %}"
          hx-target="#modalConteudo"
          hx-swap="innerHTML"
          hx-include="[name=csrfmiddlewaretoken]">
    Cancelar pedido
  </button>
</div>
{% csrf_token %}
