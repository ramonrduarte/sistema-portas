{% extends "base.html" %}
{% block content %}
<div class="container mt-4">

  <!-- ── Cabeçalho ─────────────────────────────────────────────── -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">Pedidos</h3>
    <a href="{% url 'pedido_novo' %}" class="btn btn-primary">+ Novo pedido</a>
  </div>

  <!-- ── Filtros ────────────────────────────────────────────────── -->
  <form method="get" class="mb-3">
    <div class="row g-2 align-items-end flex-wrap">

      <!-- Busca -->
      <div class="col-12 col-sm-auto flex-grow-1" style="min-width:220px;">
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-search"></i>
          </span>
          <input type="text"
                 name="q"
                 id="buscaPedidos"
                 class="form-control"
                 placeholder="Número, código ou nome do cliente..."
                 value="{{ q }}"
                 hx-get="{% url 'pedidos_lista' %}"
                 hx-trigger="keyup changed delay:400ms"
                 hx-target="#conteudoTabela"
                 hx-swap="innerHTML"
                 hx-include="[name='data_de'],[name='data_ate'],[name='per_page']"
                 autocomplete="off">
        </div>
      </div>

      <!-- Data de -->
      <div class="col-12 col-sm-auto">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
          <input type="date" name="data_de" class="form-control" value="{{ data_de }}" title="Data inicial">
        </div>
      </div>

      <!-- Data até -->
      <div class="col-12 col-sm-auto">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
          <input type="date" name="data_ate" class="form-control" value="{{ data_ate }}" title="Data final">
        </div>
      </div>

      <!-- Por página -->
      <div class="col-12 col-sm-auto">
        <select name="per_page" class="form-select" style="min-width:90px;">
          {% for opt in per_page_opcoes %}
            <option value="{{ opt }}" {% if opt == per_page %}selected{% endif %}>{{ opt }} / pág.</option>
          {% endfor %}
        </select>
      </div>

      <!-- Botão filtrar -->
      <div class="col-12 col-sm-auto d-flex gap-2">
        <button type="submit" class="btn btn-secondary">Filtrar</button>
        {% if q or data_de or data_ate %}
          <a href="{% url 'pedidos_lista' %}" class="btn btn-outline-secondary">Limpar</a>
        {% endif %}
      </div>

    </div>
  </form>

  <!-- ── Tabela ─────────────────────────────────────────────────── -->
  <div id="conteudoTabela">
    {% include "portas/pedido/_pedido_tabela.html" %}
  </div>

</div>
{% endblock %}
