{% extends "base.html" %}
{% block content %}
<div class="container mt-4">

  <!-- ── Cabeçalho ─────────────────────────────────────────────── -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">Pedidos</h3>
    <a href="{% url 'pedido_novo' %}" class="btn btn-primary">+ Novo pedido</a>
  </div>

  <!-- ── Busca ──────────────────────────────────────────────────── -->
  <div class="mb-3" style="max-width:420px;">
    <div class="input-group">
      <span class="input-group-text bg-white text-muted">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
        </svg>
      </span>
      <input type="text"
             name="q"
             id="buscaPedidos"
             class="form-control"
             placeholder="Número, código ou nome do cliente..."
             value="{{ request.GET.q }}"
             hx-get="{% url 'pedidos_lista' %}"
             hx-trigger="keyup changed delay:400ms"
             hx-target="#conteudoTabela"
             hx-swap="innerHTML"
             autocomplete="off">
    </div>
  </div>

  <!-- ── Tabela ─────────────────────────────────────────────────── -->
  <div id="conteudoTabela">
    {% include "portas/pedido/_pedido_tabela.html" %}
  </div>

</div>
{% endblock %}
