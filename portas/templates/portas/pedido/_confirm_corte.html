<span id="modalTitulo" hx-swap-oob="true">Enviar para Corte</span>

<div hx-swap-oob="true" id="modalDialogClass">
  modal-dialog modal-dialog-centered
</div>

<div class="mb-4">
  <p class="mb-1">Enviar pedido <strong>#{{ pedido.numero }}</strong> para <strong>Aguardando Corte</strong>?</p>
  <p class="text-muted small mb-0">
    {{ pedido.data|date:"d/m/Y" }} &bull; {{ pedido.cliente.codigo }} – {{ pedido.cliente.nome }}
  </p>
  <div class="alert alert-warning mt-3 mb-0 small py-2">
    O pedido sairá de <strong>Aberto</strong> e ficará aguardando o corte das peças.
  </div>
</div>

<div class="d-flex justify-content-end gap-2">
  <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
  <button class="btn btn-warning"
          hx-post="{% url 'pedido_enviar_corte' pedido.id %}"
          hx-target="#modalConteudo"
          hx-swap="innerHTML"
          hx-include="[name=csrfmiddlewaretoken]">
    Confirmar
  </button>
</div>
{% csrf_token %}
