<span id="modalTitulo" hx-swap-oob="true">Novo Pedido</span>

<div hx-swap-oob="true" id="modalDialogClass">
  modal-dialog modal-dialog-centered
</div>

<form
  hx-post="{% url 'pedido_novo' %}"
  hx-target="#modalConteudo"
  hx-swap="innerHTML"
>
  {% csrf_token %}

  {{ form.non_field_errors }}

  <!-- ── CLIENTE ─────────────────────────────────────────────────── -->
  <div class="mb-4">
    <label class="form-label fw-semibold">
      <span class="text-danger">*</span> Cliente
    </label>
    <input type="hidden" name="cliente" id="id_cliente" value="">
    <div class="input-group">
      <input
        id="clienteBusca"
        type="text"
        name="q"
        class="form-control"
        placeholder="Digite o código ou parte do nome..."
        hx-get="{% url 'htmx_clientes_sugestoes' %}"
        hx-trigger="keyup changed delay:400ms"
        hx-target="#clienteSugestoes"
        hx-swap="innerHTML"
        autocomplete="off"
      >
      <span class="input-group-text bg-white text-muted">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
        </svg>
      </span>
    </div>
    <div id="clienteResultados" class="small text-muted mt-1">Nenhum cliente selecionado.</div>
    <div id="clienteSugestoes" class="mt-1"></div>
    {% if form.cliente.errors %}
      <div class="text-danger small mt-1">{{ form.cliente.errors }}</div>
    {% endif %}
  </div>

  <!-- ── BOTÕES ─────────────────────────────────────────────────── -->
  <div class="d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button class="btn btn-primary px-4" type="submit">Criar pedido</button>
  </div>

</form>
