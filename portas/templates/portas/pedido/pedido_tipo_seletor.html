{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width:540px;">
  <h4 class="mb-1">Novo Pedido</h4>
  <p class="text-muted mb-4">Selecione o tipo de pedido que deseja criar.</p>

  <div class="row g-3">
    <div class="col-6">
      <a href="{% url 'pedido_novo' %}?tipo=porta" class="text-decoration-none">
        <div class="card shadow-sm h-100 text-center p-4 border-primary" style="cursor:pointer;">
          <div class="mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#0d6efd" viewBox="0 0 16 16">
              <path d="M8 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
              <path d="M13.5 1h-11A1.5 1.5 0 0 0 1 2.5V15h14V2.5A1.5 1.5 0 0 0 13.5 1zM2 2.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 .5.5V14H2V2.5z"/>
            </svg>
          </div>
          <h5 class="mb-1 text-primary">Portas</h5>
          <small class="text-muted">Pedido de esquadrias com perfis, vidros e acessórios</small>
        </div>
      </a>
    </div>
    <div class="col-6">
      <a href="{% url 'pedido_novo_vidro' %}" class="text-decoration-none">
        <div class="card shadow-sm h-100 text-center p-4 border-info" style="cursor:pointer;">
          <div class="mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#0dcaf0" viewBox="0 0 16 16">
              <path d="M0 1.5A1.5 1.5 0 0 1 1.5 0h13A1.5 1.5 0 0 1 16 1.5v13a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 14.5v-13zM1.5 1a.5.5 0 0 0-.5.5v13a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-13a.5.5 0 0 0-.5-.5h-13z"/>
            </svg>
          </div>
          <h5 class="mb-1 text-info">Vidros</h5>
          <small class="text-muted">Pedido de vidros avulsos por medida e modelo</small>
        </div>
      </a>
    </div>
  </div>

  <div class="mt-3">
    <a href="{% url 'pedidos_lista' %}" class="btn btn-outline-secondary btn-sm">← Voltar</a>
  </div>
</div>
{% endblock %}
