<span id="modalTitulo" hx-swap-oob="true">Reabrir pedido</span>

<div hx-swap-oob="true" id="modalDialogClass">
  modal-dialog modal-dialog-centered
</div>

<div class="mb-4">
  <p class="mb-1">Deseja reabrir o pedido <strong>#{{ pedido.numero }}</strong>?</p>
  <p class="text-muted small mb-0">
    {{ pedido.data|date:"d/m/Y" }} &bull; {{ pedido.cliente.codigo }} – {{ pedido.cliente.nome }}
  </p>
  <div class="alert alert-info mt-3 mb-0 small py-2">
    O pedido voltará ao status <strong>Aberto</strong> e poderá ser editado normalmente.
  </div>
</div>

<div class="d-flex justify-content-end gap-2">
  <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
  <button class="btn btn-primary"
          hx-post="{% url 'pedido_reabrir' pedido.id %}"
          hx-target="#conteudoTabela"
          hx-swap="innerHTML"
          hx-include="[name=csrfmiddlewaretoken]">
    Reabrir pedido
  </button>
</div>
{% csrf_token %}
