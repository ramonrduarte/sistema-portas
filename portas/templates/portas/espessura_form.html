{% load static %}

<form method="post" id="espessura-form" action="{{ request.path }}">
  {% csrf_token %}

  {{ form.non_field_errors }}

  <div class="mb-3">
    <label class="form-label">{{ form.valor_mm.label }}</label>

    <div class="input-group">
      {{ form.valor_mm }}
      <span class="input-group-text">mm</span>
    </div>

    <div class="text-danger small">
      {{ form.valor_mm.errors }}
    </div>
  </div>
</form>
