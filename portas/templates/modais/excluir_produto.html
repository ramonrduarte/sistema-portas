{# atualiza o título do modal global #}
<span id="modalTitulo" hx-swap-oob="true">
  {{ titulo|default:"Excluir" }}
</span>

<form method="post"
      hx-post="{% url post_url obj_id %}"
      hx-target="{{ target_id|default:'#conteudoTabela' }}"
      hx-swap="innerHTML">
  {% csrf_token %}

  <div class="py-2">
    {{ texto|safe }}
  </div>

  <div class="d-flex justify-content-end gap-2 mt-4">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
      Cancelar
    </button>
    <button type="submit" class="btn btn-danger">
      Excluir
    </button>
  </div>
</form>

<script>
  // fecha quando atualizar a tabela alvo
  document.body.addEventListener("htmx:afterSwap", function (evt) {
    if (evt.target && evt.target.id === "tabelaPerfisPuxador") {
      const modalEl = document.getElementById("modalCadastro");
      const modal = bootstrap.Modal.getInstance(modalEl);
      if (modal) modal.hide();
    }
  });
</script>
