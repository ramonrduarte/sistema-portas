{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Sistema Portas{% endblock %}</title>

    <!-- Bootstrap CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >

    <style>
      /* Deixa as opções PF / PJ lado a lado no campo tipo_pessoa */
      #div_id_tipo_pessoa .form-check {
        display: inline-block;
        margin-right: 1.5rem; /* espaçamento entre PF e PJ */
      }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Sistema Portas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="/clientes/">Clientes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/perfis/">Perfis</a>
        </li>
        <!-- aqui você vai adicionando outros menus depois -->
      </ul>
    </div>
  </div>
</nav>

<main class="container mb-4">
    {% block content %}{% endblock %}
</main>

<!-- Bootstrap JS (CDN) -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous"
></script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
        crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"
        integrity="sha512-pHVGpX7F/27yZ0ISY+V2zKJxCqCkqv0FP9Qn2FZC1ZkE8AjtKq6HgMHpmwVKI7FfWvC9Zp2JgNsP1L8Wc4Sf2w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script src="https://unpkg.com/htmx.org@1.9.12"></script>
        

{% block extra_js %}{% endblock %}
</body>
</html>
