{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Clientes</h4>

    <button class="btn btn-primary"
            hx-get="{% url 'clientes_novo' %}"
            hx-target="#modalConteudo"
            data-bs-toggle="modal"
            data-bs-target="#modalCadastro">
      + Novo cliente
    </button>
  </div>

  <!-- Filtros -->
  <form method="get" class="mb-3">
    <div class="row g-2 align-items-end flex-wrap">

      <!-- Busca -->
      <div class="col-12 col-sm-auto flex-grow-1" style="min-width:220px;">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="text"
                 name="q"
                 id="buscaClientes"
                 class="form-control"
                 placeholder="Código, nome ou CPF/CNPJ..."
                 value="{{ q }}"
                 hx-get="{% url 'clientes_lista' %}"
                 hx-trigger="keyup changed delay:400ms"
                 hx-target="#conteudoTabela"
                 hx-swap="innerHTML"
                 hx-include="[name='per_page'],[name='sort'],[name='dir']"
                 autocomplete="off">
        </div>
      </div>

      <!-- Por página -->
      <div class="col-12 col-sm-auto">
        <select name="per_page" class="form-select" style="min-width:90px;">
          {% for opt in per_page_opcoes %}
            <option value="{{ opt }}" {% if opt == per_page %}selected{% endif %}>{{ opt }} / pág.</option>
          {% endfor %}
        </select>
      </div>

      <!-- Botão filtrar / limpar -->
      <div class="col-12 col-sm-auto d-flex gap-2">
        <button type="submit" class="btn btn-secondary">Filtrar</button>
        {% if q %}
          <a href="{% url 'clientes_lista' %}" class="btn btn-outline-secondary">Limpar</a>
        {% endif %}
      </div>

    </div>
    <input type="hidden" name="sort" value="{{ sort|default:'nome' }}">
    <input type="hidden" name="dir" value="{{ dir|default:'asc' }}">
  </form>

  <div id="conteudoTabela">
    {% include "clientes/_tabela.html" %}
  </div>
</div>
{% endblock %}
