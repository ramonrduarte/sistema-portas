{% load crispy_forms_tags %}

<span id="modalTitulo" hx-swap-oob="true">
  {% if object %}Editar Cliente{% else %}Novo Cliente{% endif %}
</span>

<form
  hx-post="{% if object %}{% url 'clientes_editar' object.pk %}{% else %}{% url 'clientes_novo' %}{% endif %}"
  hx-target="#conteudoTabela"
  hx-swap="innerHTML"
>
  {% csrf_token %}

  <div class="py-2">
    {% crispy form %}
  </div>

  <div class="d-flex justify-content-end gap-2 mt-3">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
      Cancelar
    </button>
    <button type="submit" class="btn btn-primary">
      Salvar
    </button>
  </div>

  {% if object and object.bimer_id %}
  <div id="bimer-id-cliente" class="mt-3 p-2 border rounded bg-light d-flex align-items-center gap-2 flex-wrap">
    <small class="text-muted">
      <i class="bi bi-link-45deg"></i> ID Bimer vinculado: <code>{{ object.bimer_id }}</code>
    </small>
    <button type="button" class="btn btn-outline-danger btn-sm ms-auto"
            hx-post="{% url 'limpar_bimer_cliente' object.pk %}"
            hx-target="#bimer-id-cliente"
            hx-swap="outerHTML"
            hx-confirm="Limpar o ID Bimer deste cliente? Ele será buscado novamente na próxima sincronização."
            hx-include="[name=csrfmiddlewaretoken]">
      <i class="bi bi-x-circle me-1"></i>Limpar ID Bimer
    </button>
  </div>
  {% endif %}
</form>
