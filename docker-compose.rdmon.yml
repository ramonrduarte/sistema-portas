services:

  portas:
    build: .
    restart: unless-stopped
    networks:
      - rede_cloudflare
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-portas.rdmon.com,localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://portas.rdmon.com}
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${DATABASE_NAME:-portas_rdmon}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
      GPT_API_TOKEN: ${GPT_API_TOKEN}
    volumes:
      - media_data:/app/media

  postgres:
    image: postgres:16
    restart: unless-stopped
    networks:
      - rede_cloudflare
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-portas_rdmon}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  media_data:
  postgres_data:

networks:
  rede_cloudflare:
    external: true
