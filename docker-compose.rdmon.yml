services:

  portas:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - network_public
      - internal
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-portas.rdmon.com,localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://portas.rdmon.com}
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: ${DATABASE_NAME:-portas_rdmon}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
      GPT_API_TOKEN: ${GPT_API_TOKEN}
    volumes:
      - media_data:/app/media
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=network_public"
      - "traefik.http.routers.portas-rdmon.rule=Host(`portas.rdmon.com`)"
      - "traefik.http.routers.portas-rdmon.entrypoints=websecure"
      - "traefik.http.routers.portas-rdmon.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.portas-rdmon.loadbalancer.server.port=8000"

  postgres:
    image: postgres:16
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-portas_rdmon}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-portas_rdmon}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  media_data:
  postgres_data:

networks:
  network_public:
    external: true
  internal:
    driver: bridge
